name: Actualizar resultados Prode Mundial 2026
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Buscar y aplicar resultados nuevos
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/update_results.py
      - name: Commit y push si hubo cambios
        run: |
          git config user.name "prode-bot"
          git config user.email "prode-bot@users.noreply.github.com"
          if ! git diff --quiet index.html; then
            git add index.html
            git commit -m "Actualiza resultados automaticamente"
            git push
          else
            echo "Sin cambios para commitear."
          fi
